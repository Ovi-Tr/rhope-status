  owner: Ovi-Tr
  repo: rhope-status

  sites:
    - name: rhope app (SSR)
      url: https://app.rhope.app
    - name: rhope API
      url: https://api.rhope.app/api/health
    - name: rhope WebSocket
      url: https://api.rhope.app/ws/info
      check: ws

  status-website:
    cname: status.rhope.app
    name: rhope
    introTitle: "**rhope.** real-time status"
    introMessage: Status of rhope's production services. Updated every 5 minutes.
    navbar:
      - title: Status
        href: /
      - title: GitHub
        href: https://github.com/<your-user>/rhope-status
    theme: dark

  workflowSchedule:
    graphs: "0 0 * * *"     # daily uptime graphs at midnight UTC
    responseTime: "0 23 * * *"
    staticSite: "0 1 * * *"
    summary: "0 0 * * *"
    updates: "0 3 * * *"
    updateTemplate: "0 3 * * *"
    updateResponseTime: "0 23 * * *"

  i18n:
    activeIncidents: Active incidents
    allSystemsOperational: All systems operational